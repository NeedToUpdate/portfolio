# CloudFront distribution: Lambda function URL for pages, S3 for static assets.

Conditions:
  IsDevStage: !Equals ["${self:provider.stage}", "dev"]

Resources:
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: ${self:service}-${self:provider.stage}-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Respects origin Cache-Control headers. Includes Authorization in the
  # cache key so basic auth reaches the Lambda on dev. Prod requests carry
  # no Authorization header, so the cache key is unaffected there.
  AppCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: ${self:service}-${self:provider.stage}-app
        Comment: Next.js pages, origin-controlled TTL, auth-aware
        DefaultTTL: 3600
        MaxTTL: 31536000
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingBrotli: true
          EnableAcceptEncodingGzip: true
          QueryStringsConfig:
            # Next.js App Router uses _rsc to separate navigation payloads
            # from full HTML documents. It must be part of the cache key.
            QueryStringBehavior: all
          HeadersConfig:
            HeaderBehavior: whitelist
            Headers:
              - Authorization
          CookiesConfig:
            CookieBehavior: none

  # Optimized image URLs are content-addressed by their complete query string
  # (`url`, `w`, and `q`). Lambda renders each variant once per edge cache.
  ImageCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: ${self:service}-${self:provider.stage}-images
        Comment: Next.js image optimizer variants, cached for one year
        DefaultTTL: 31536000
        MaxTTL: 31536000
        MinTTL: 31536000
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingBrotli: true
          EnableAcceptEncodingGzip: true
          QueryStringsConfig:
            QueryStringBehavior: all
          HeadersConfig:
            HeaderBehavior: whitelist
            Headers:
              - Accept
          CookiesConfig:
            CookieBehavior: none

  # PostHog reverse proxy (/relay/*, see the CacheBehaviors below).
  # Requests arrive same-origin so browser/extension ad-blockers that
  # target posthog.com by domain don't see them. The function strips
  # the /relay prefix, since PostHog's origin expects unprefixed paths.
  PostHogProxyFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: ${self:service}-${self:provider.stage}-posthog-proxy
      AutoPublish: true
      FunctionConfig:
        Comment: Strips the /relay prefix before forwarding to PostHog
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          request.uri = request.uri.replace(/^\/relay/, "") || "/";
          return request;
        }

  # PostHog needs Origin and Authorization plus every query string
  # forwarded to its origin. This only controls what's sent upstream;
  # caching itself is governed per-behavior below.
  PostHogOriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: ${self:service}-${self:provider.stage}-posthog-origin-request
        Comment: Forwards auth/origin headers and query strings to PostHog
        HeadersConfig:
          HeaderBehavior: whitelist
          Headers:
            - Origin
            - Authorization
        QueryStringsConfig:
          QueryStringBehavior: all
        CookiesConfig:
          CookieBehavior: none

  # Static SDK assets and remote config are cacheable; event capture
  # and flag evaluation are not (they use Managed-CachingDisabled on
  # the /relay/* catch-all behavior instead).
  PostHogAssetCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: ${self:service}-${self:provider.stage}-posthog-assets
        Comment: PostHog SDK assets and remote config
        DefaultTTL: 3600
        MaxTTL: 86400
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingBrotli: true
          EnableAcceptEncodingGzip: true
          QueryStringsConfig:
            QueryStringBehavior: all
          HeadersConfig:
            HeaderBehavior: whitelist
            Headers:
              - Origin
              - Authorization
          CookiesConfig:
            CookieBehavior: none

  # Markdown for Agents: requests that accept text/markdown are rewritten
  # to the /md mirror before the cache lookup, so the HTML and markdown
  # variants each cache under their own URL and the Accept header never
  # joins the cache key (which would fragment it per browser). The page
  # allowlist must stay in sync with AGENT_PAGE_PATTERN in proxy.ts,
  # which applies the same rewrite at the origin for dev and local runs.
  MarkdownNegotiationFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: ${self:service}-${self:provider.stage}-markdown-negotiation
      AutoPublish: true
      FunctionConfig:
        Comment: Serves the /md markdown mirror to agents that ask for it
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var accept = request.headers.accept ? request.headers.accept.value : "";
          var pages = /^\/(?:(?:work|insights)\/[^\/]+|work|insights|projects|about|contact)?$/;
          if (accept.indexOf("text/markdown") !== -1 && pages.test(request.uri)) {
            request.uri = request.uri === "/" ? "/md" : "/md" + request.uri;
          }
          return request;
        }

  DevResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Condition: IsDevStage
    Properties:
      ResponseHeadersPolicyConfig:
        Name: ${self:service}-${self:provider.stage}-auth
        Comment: Restores the browser Basic Auth challenge header for dev
        CustomHeadersConfig:
          Items:
            - Header: WWW-Authenticate
              Value: Basic realm="Dev Site"
              Override: false

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: ${self:service}-${self:provider.stage}
        Aliases: ${self:custom.config.domainAliases}
        HttpVersion: http2and3
        DefaultRootObject: ""
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt AssetsBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !Ref OriginAccessControl
          - Id: LambdaOrigin
            DomainName:
              !Select [2, !Split ["/", !GetAtt WebLambdaFunctionUrl.FunctionUrl]]
            CustomOriginConfig:
              HTTPPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
          # PostHog Cloud, US region. Swap both domains for the eu.*
          # equivalents together if the project ever moves regions.
          - Id: PostHogOrigin
            DomainName: us.i.posthog.com
            CustomOriginConfig:
              HTTPPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
          - Id: PostHogAssetsOrigin
            DomainName: us-assets.i.posthog.com
            CustomOriginConfig:
              HTTPPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: LambdaOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: !Ref AppCachePolicy
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac # AllViewerExceptHostHeader
          ResponseHeadersPolicyId:
            !If
              - IsDevStage
              - !Ref DevResponseHeadersPolicy
              - 67f7725c-6f97-4210-82d7-5512b31e9d03 # Managed SecurityHeaders
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt MarkdownNegotiationFunction.FunctionMetadata.FunctionARN
          Compress: true
        CacheBehaviors:
          # Order matters: CloudFront matches the first pattern in this
          # list, not the most specific one, so /relay/static/* and
          # /relay/array/* must precede the /relay/* catch-all.
          - PathPattern: "/relay/static/*"
            TargetOriginId: PostHogAssetsOrigin
            ViewerProtocolPolicy: https-only
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachePolicyId: !Ref PostHogAssetCachePolicy
            OriginRequestPolicyId: !Ref PostHogOriginRequestPolicy
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt PostHogProxyFunction.FunctionMetadata.FunctionARN
            Compress: true
          - PathPattern: "/relay/array/*"
            TargetOriginId: PostHogAssetsOrigin
            ViewerProtocolPolicy: https-only
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachePolicyId: !Ref PostHogAssetCachePolicy
            OriginRequestPolicyId: !Ref PostHogOriginRequestPolicy
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt PostHogProxyFunction.FunctionMetadata.FunctionARN
            Compress: true
          # Catch-all: event capture, flag evaluation. Never cached —
          # these are live API calls, not assets.
          - PathPattern: "/relay/*"
            TargetOriginId: PostHogOrigin
            ViewerProtocolPolicy: https-only
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # Managed CachingDisabled
            OriginRequestPolicyId: !Ref PostHogOriginRequestPolicy
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt PostHogProxyFunction.FunctionMetadata.FunctionARN
            Compress: true
          - PathPattern: "/_next/image*"
            TargetOriginId: LambdaOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
            CachePolicyId: !Ref ImageCachePolicy
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac # AllViewerExceptHostHeader
            ResponseHeadersPolicyId:
              !If
                - IsDevStage
                - !Ref DevResponseHeadersPolicy
                - 67f7725c-6f97-4210-82d7-5512b31e9d03
            Compress: true
          - PathPattern: "/api/*"
            TargetOriginId: LambdaOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # Managed CachingDisabled
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac # AllViewerExceptHostHeader
            ResponseHeadersPolicyId:
              !If
                - IsDevStage
                - !Ref DevResponseHeadersPolicy
                - 67f7725c-6f97-4210-82d7-5512b31e9d03
          - PathPattern: "/_next/static/*"
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # Managed CachingOptimized
            Compress: true
          - PathPattern: "/images/*"
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # Managed CachingOptimized
            Compress: true
        ViewerCertificate:
          AcmCertificateArn: ${self:custom.config.certificateArn}
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

Outputs:
  CloudFrontDistributionId:
    Description: CloudFront distribution id (used by cache invalidation)
    Value: !Ref CloudFrontDistribution
    Export:
      Name: ${self:service}-${self:provider.stage}-cf-id
  CloudFrontDomain:
    Description: CloudFront domain for DNS CNAME setup
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: ${self:service}-${self:provider.stage}-cf-domain
