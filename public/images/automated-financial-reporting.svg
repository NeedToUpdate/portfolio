<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">IFRS 17 reporting automation</title>
  <desc id="desc">Five source systems flow through a controlled reporting pipeline, warehouse, finance month-close posting, IFRS 17 handoff, and a quarantine repair path.</desc>

  <rect width="1280" height="620" rx="16" fill="#151924"/>
  <rect x="10" y="10" width="1260" height="600" rx="16" fill="#151924" stroke="#2a303f"/>

  <text x="54" y="58" fill="#ebedf3" font-family="Arial, sans-serif" font-size="27" font-weight="700">IFRS 17 reporting automation</text>
  <text x="54" y="88" fill="#aab1c0" font-family="Arial, sans-serif" font-size="15">A month-long manual reporting cycle became a timed, traceable run.</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#deba6c"/>
    </marker>
    <style>
      .panel { fill: #0e1119; stroke: #2a303f; stroke-width: 2; }
      .stage { fill: #121723; stroke: #3a4358; stroke-width: 2; }
      .gold { fill: #171b26; stroke: #deba6c; stroke-width: 2.25; }
      .cyan { fill: #101a23; stroke: #60cdd8; stroke-width: 2.25; }
      .warn { fill: #1e1812; stroke: #deba6c; stroke-width: 2; }
      .label { fill: #ebedf3; font: 700 16px Arial, sans-serif; }
      .small { fill: #aab1c0; font: 13px Arial, sans-serif; }
      .tiny { fill: #aab1c0; font: 12px Arial, sans-serif; }
      .line { stroke: #deba6c; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #687085; stroke-width: 1.8; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="panel" x="54" y="130" width="174" height="318" rx="12"/>
  <text class="label" x="141" y="166" text-anchor="middle">Source feeds</text>
  <text class="small" x="141" y="206" text-anchor="middle">CSV</text>
  <text class="small" x="141" y="242" text-anchor="middle">Line text</text>
  <text class="small" x="141" y="278" text-anchor="middle">Plain text</text>
  <text class="small" x="141" y="314" text-anchor="middle">Excel</text>
  <text class="small" x="141" y="350" text-anchor="middle">JSONL</text>
  <text class="tiny" x="141" y="406" text-anchor="middle">5 systems</text>

  <rect class="gold" x="310" y="130" width="456" height="318" rx="14"/>
  <text class="label" x="538" y="166" text-anchor="middle">Controlled reporting pipeline</text>
  <text class="small" x="538" y="194" text-anchor="middle">Timed Glue workflow</text>

  <rect class="stage" x="350" y="258" width="160" height="88" rx="10"/>
  <text class="label" x="430" y="296" text-anchor="middle">Ingest</text>
  <text class="small" x="430" y="322" text-anchor="middle">Normalize files</text>

  <rect class="cyan" x="550" y="236" width="178" height="88" rx="10"/>
  <text class="label" x="639" y="274" text-anchor="middle">Validate</text>
  <text class="small" x="639" y="300" text-anchor="middle">CSV rule list</text>

  <rect class="stage" x="550" y="350" width="178" height="88" rx="10"/>
  <text class="label" x="639" y="388" text-anchor="middle">Transform</text>
  <text class="small" x="639" y="414" text-anchor="middle">Code-backed config</text>

  <path class="line" d="M228 302 H350"/>
  <path class="line" d="M510 302 H550"/>
  <path class="line" d="M639 324 V350"/>

  <rect class="warn" x="350" y="486" width="378" height="72" rx="10"/>
  <text class="label" x="539" y="520" text-anchor="middle">Quarantine and repair</text>
  <text class="small" x="539" y="544" text-anchor="middle">Bad files do not block clean sources</text>
  <path class="thin" d="M550 324 C494 378 446 430 414 486"/>

  <rect class="stage" x="846" y="190" width="174" height="104" rx="10"/>
  <text class="label" x="933" y="230" text-anchor="middle">Warehouse</text>
  <text class="small" x="933" y="256" text-anchor="middle">Output</text>
  <text class="small" x="933" y="278" text-anchor="middle">Run metadata</text>
  <path class="line" d="M766 242 H846"/>

  <rect class="stage" x="846" y="390" width="174" height="104" rx="10"/>
  <text class="label" x="933" y="430" text-anchor="middle">Audit trail</text>
  <text class="small" x="933" y="456" text-anchor="middle">Source data</text>
  <text class="small" x="933" y="478" text-anchor="middle">Rule + transform</text>
  <path class="thin" d="M728 394 C782 414 810 438 846 442"/>

  <rect class="gold" x="1096" y="190" width="124" height="104" rx="10"/>
  <text class="label" x="1158" y="230" text-anchor="middle">Finance</text>
  <text class="small" x="1158" y="256" text-anchor="middle">Month-close</text>
  <text class="small" x="1158" y="278" text-anchor="middle">posting</text>
  <path class="line" d="M1020 242 H1096"/>

  <rect class="stage" x="1096" y="390" width="124" height="104" rx="10"/>
  <text class="label" x="1158" y="430" text-anchor="middle">IFRS 17</text>
  <text class="small" x="1158" y="456" text-anchor="middle">Team</text>
  <text class="small" x="1158" y="478" text-anchor="middle">Third party</text>
  <path class="line" d="M1158 294 V390"/>

  <rect class="panel" x="54" y="486" width="174" height="72" rx="10"/>
  <text class="label" x="141" y="520" text-anchor="middle">Run time</text>
  <text class="small" x="141" y="544" text-anchor="middle">Under 15 minutes</text>
</svg>
