<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">Enrollment processing system</title>
  <desc id="desc">Monthly SFTP enrollment files flow through state reconciliation, controlled manual changes, nightly delta generation, TPA delivery, and monitoring.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#deba6c"/>
    </marker>
    <style>
      .bg{fill:#151922;stroke:#273143;stroke-width:1.5}
      .panel{fill:#111722;stroke:#344058;stroke-width:1.5}
      .main{fill:#17202e;stroke:#deba6c;stroke-width:2}
      .accent{fill:#12242a;stroke:#56d4e7;stroke-width:2}
      .good{fill:#10271d;stroke:#28d37f;stroke-width:2}
      .warn{fill:#211a12;stroke:#deba6c;stroke-width:2}
      .line{fill:none;stroke:#deba6c;stroke-width:3;marker-end:url(#arrow)}
      .dash{fill:none;stroke:#7c879a;stroke-width:2;stroke-dasharray:7 8;marker-end:url(#arrow)}
      .label{fill:#f4f7fb;font:700 17px Arial, sans-serif}
      .small{fill:#c6cfdd;font:400 13px Arial, sans-serif}
      .tiny{fill:#aeb8c8;font:400 12px Arial, sans-serif}
      .title{fill:#f4f7fb;font:700 30px Arial, sans-serif}
      .subtitle{fill:#c6cfdd;font:400 15px Arial, sans-serif}
    </style>
  </defs>

  <rect class="bg" x="18" y="18" width="1244" height="584" rx="12"/>
  <text class="title" x="62" y="72">Enrollment processing system</text>
  <text class="subtitle" x="62" y="100">Monthly student files became a traceable TPA delta workflow.</text>

  <rect class="panel" x="62" y="145" width="188" height="250" rx="10"/>
  <text class="label" x="156" y="178" text-anchor="middle">SFTP files</text>
  <text class="small" x="156" y="213" text-anchor="middle">Full CSV</text>
  <text class="small" x="156" y="248" text-anchor="middle">Delta CSV</text>
  <text class="small" x="156" y="283" text-anchor="middle">Monthly cycle</text>
  <text class="tiny" x="156" y="352" text-anchor="middle">1M+ students</text>

  <rect class="warn" x="62" y="440" width="188" height="82" rx="9"/>
  <text class="label" x="156" y="474" text-anchor="middle">Before</text>
  <text class="small" x="156" y="500" text-anchor="middle">Week-long manual delay</text>

  <rect class="main" x="318" y="138" width="475" height="300" rx="12"/>
  <text class="label" x="556" y="174" text-anchor="middle">Controlled enrollment workflow</text>
  <text class="small" x="556" y="202" text-anchor="middle">State, changes, exceptions, and output</text>

  <rect class="panel" x="360" y="246" width="146" height="80" rx="9"/>
  <text class="label" x="433" y="280" text-anchor="middle">Ingest</text>
  <text class="small" x="433" y="306" text-anchor="middle">Glue pickup</text>

  <rect class="accent" x="555" y="230" width="176" height="96" rx="10"/>
  <text class="label" x="643" y="268" text-anchor="middle">Reconcile state</text>
  <text class="small" x="643" y="294" text-anchor="middle">Full + delta files</text>

  <rect class="panel" x="555" y="350" width="176" height="68" rx="9"/>
  <text class="label" x="643" y="379" text-anchor="middle">Detect changes</text>
  <text class="small" x="643" y="403" text-anchor="middle">Student + coverage</text>

  <rect class="panel" x="385" y="360" width="132" height="58" rx="8"/>
  <text class="label" x="451" y="384" text-anchor="middle">Database</text>
  <text class="small" x="451" y="405" text-anchor="middle">Current state</text>

  <rect class="warn" x="318" y="472" width="475" height="78" rx="10"/>
  <text class="label" x="556" y="505" text-anchor="middle">Admin portal</text>
  <text class="small" x="556" y="530" text-anchor="middle">Controlled manual corrections when the business needs them</text>

  <rect class="accent" x="860" y="176" width="178" height="90" rx="10"/>
  <text class="label" x="949" y="214" text-anchor="middle">Nightly report</text>
  <text class="small" x="949" y="240" text-anchor="middle">Approved changes</text>

  <rect class="panel" x="860" y="320" width="178" height="90" rx="10"/>
  <text class="label" x="949" y="358" text-anchor="middle">TPA delta file</text>
  <text class="small" x="949" y="384" text-anchor="middle">One line per student</text>

  <rect class="good" x="1092" y="320" width="126" height="90" rx="10"/>
  <text class="label" x="1155" y="358" text-anchor="middle">TPA</text>
  <text class="small" x="1155" y="384" text-anchor="middle">Enrollment update</text>

  <rect class="panel" x="860" y="472" width="358" height="78" rx="10"/>
  <text class="label" x="1039" y="505" text-anchor="middle">Monitoring + alerts</text>
  <text class="small" x="1039" y="530" text-anchor="middle">File, format, run status, and support visibility</text>

  <path class="line" d="M250 270 H360"/>
  <path class="line" d="M506 286 H555"/>
  <path class="line" d="M643 326 V350"/>
  <path class="line" d="M731 384 H860"/>
  <path class="line" d="M949 266 V320"/>
  <path class="line" d="M1038 365 H1092"/>
  <path class="line" d="M731 278 H810 V221 H860"/>
  <path class="dash" d="M451 360 V326"/>
  <path class="dash" d="M556 472 V438"/>
  <path class="dash" d="M643 418 V472"/>
  <path class="dash" d="M949 410 V472"/>
</svg>
