<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">Tableau integration</title>
  <desc id="desc">Business users access Tableau through governed identity controls inside a private AWS environment connected to Redshift and managed as infrastructure as code.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#deba6c"/>
    </marker>
    <style>
      .bg{fill:#151922;stroke:#273143;stroke-width:1.5}
      .panel{fill:#111722;stroke:#344058;stroke-width:1.5}
      .main{fill:#17202e;stroke:#deba6c;stroke-width:2}
      .accent{fill:#12242a;stroke:#56d4e7;stroke-width:2}
      .good{fill:#10271d;stroke:#28d37f;stroke-width:2}
      .warn{fill:#211a12;stroke:#deba6c;stroke-width:2}
      .line{fill:none;stroke:#deba6c;stroke-width:3;marker-end:url(#arrow)}
      .dash{fill:none;stroke:#7c879a;stroke-width:2;stroke-dasharray:7 8;marker-end:url(#arrow)}
      .label{fill:#f4f7fb;font:700 17px Arial, sans-serif}
      .small{fill:#c6cfdd;font:400 13px Arial, sans-serif}
      .tiny{fill:#aeb8c8;font:400 12px Arial, sans-serif}
      .title{fill:#f4f7fb;font:700 30px Arial, sans-serif}
      .subtitle{fill:#c6cfdd;font:400 15px Arial, sans-serif}
    </style>
  </defs>

  <rect class="bg" x="18" y="18" width="1244" height="584" rx="12"/>
  <text class="title" x="62" y="72">Tableau integration</text>
  <text class="subtitle" x="62" y="100">A governed BI platform gave business teams direct access to warehouse data.</text>

  <rect class="panel" x="64" y="168" width="176" height="92" rx="10"/>
  <text class="label" x="152" y="206" text-anchor="middle">Business users</text>
  <text class="small" x="152" y="232" text-anchor="middle">Dashboards + analysis</text>

  <rect class="accent" x="306" y="168" width="190" height="92" rx="10"/>
  <text class="label" x="401" y="206" text-anchor="middle">Identity controls</text>
  <text class="small" x="401" y="232" text-anchor="middle">Company access model</text>

  <rect class="main" x="560" y="128" width="418" height="310" rx="12"/>
  <text class="label" x="769" y="165" text-anchor="middle">Private AWS BI platform</text>
  <text class="small" x="769" y="192" text-anchor="middle">Network isolation, access controls, and operations</text>

  <rect class="panel" x="604" y="238" width="142" height="78" rx="9"/>
  <text class="label" x="675" y="271" text-anchor="middle">Load balancer</text>
  <text class="small" x="675" y="296" text-anchor="middle">Private entry</text>

  <rect class="accent" x="792" y="226" width="142" height="102" rx="10"/>
  <text class="label" x="863" y="266" text-anchor="middle">Tableau</text>
  <text class="small" x="863" y="292" text-anchor="middle">Server on EC2</text>

  <rect class="panel" x="604" y="346" width="330" height="62" rx="9"/>
  <text class="label" x="769" y="372" text-anchor="middle">Operations controls</text>
  <text class="small" x="769" y="394" text-anchor="middle">Patching, backups, access support, and changes</text>

  <rect class="good" x="1050" y="226" width="154" height="102" rx="10"/>
  <text class="label" x="1127" y="266" text-anchor="middle">Redshift</text>
  <text class="small" x="1127" y="292" text-anchor="middle">Warehouse data</text>

  <rect class="warn" x="306" y="380" width="190" height="82" rx="10"/>
  <text class="label" x="401" y="414" text-anchor="middle">IaC deployment</text>
  <text class="small" x="401" y="440" text-anchor="middle">Repeatable environment</text>

  <rect class="panel" x="64" y="380" width="176" height="82" rx="10"/>
  <text class="label" x="152" y="414" text-anchor="middle">Admin path</text>
  <text class="small" x="152" y="440" text-anchor="middle">Support + governance</text>

  <path class="line" d="M240 214 H306"/>
  <path class="line" d="M496 214 H560"/>
  <path class="line" d="M746 277 H792"/>
  <path class="line" d="M934 277 H1050"/>
  <path class="dash" d="M401 380 V316 H604"/>
  <path class="dash" d="M240 421 H306"/>
  <path class="dash" d="M769 346 V328"/>
</svg>
