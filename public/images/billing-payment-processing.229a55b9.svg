<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">Billing and payment processing flow</title>
  <desc id="desc">A member uses a self-service billing site, validates against enrollment data, enters payment details inside Moneris, and sends a payment reference to the TPA billing system. Support remains as a fallback path.</desc>

  <rect width="1280" height="620" rx="16" fill="#151924"/>
  <rect x="10" y="10" width="1260" height="600" rx="16" fill="#151924" stroke="#2a303f"/>

  <text x="54" y="58" fill="#ebedf3" font-family="Arial, sans-serif" font-size="27" font-weight="700">Self-service billing update flow</text>
  <text x="54" y="88" fill="#aab1c0" font-family="Arial, sans-serif" font-size="15">Delivered in three weeks so members could update billing details without calling the call center.</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#deba6c"/>
    </marker>
    <style>
      .panel { fill: #0e1119; stroke: #2a303f; stroke-width: 2; }
      .stage { fill: #121723; stroke: #3a4358; stroke-width: 2; }
      .gold { fill: #171b26; stroke: #deba6c; stroke-width: 2.25; }
      .cyan { fill: #101a23; stroke: #60cdd8; stroke-width: 2.25; }
      .warn { fill: #1e1812; stroke: #deba6c; stroke-width: 2; }
      .label { fill: #ebedf3; font: 700 16px Arial, sans-serif; }
      .small { fill: #aab1c0; font: 13px Arial, sans-serif; }
      .tiny { fill: #aab1c0; font: 12px Arial, sans-serif; }
      .line { stroke: #deba6c; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #687085; stroke-width: 1.8; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="panel" x="54" y="148" width="170" height="104" rx="12"/>
  <text class="label" x="139" y="188" text-anchor="middle">Member</text>
  <text class="small" x="139" y="214" text-anchor="middle">Updates card</text>
  <text class="small" x="139" y="236" text-anchor="middle">Self-service</text>

  <rect class="gold" x="300" y="148" width="190" height="104" rx="12"/>
  <text class="label" x="395" y="188" text-anchor="middle">Billing site</text>
  <text class="small" x="395" y="214" text-anchor="middle">Member lookup</text>
  <text class="small" x="395" y="236" text-anchor="middle">Identity check</text>
  <path class="line" d="M224 200 H300"/>

  <rect class="stage" x="300" y="330" width="190" height="104" rx="12"/>
  <text class="label" x="395" y="370" text-anchor="middle">Enrollment data</text>
  <text class="small" x="395" y="396" text-anchor="middle">Refreshed records</text>
  <text class="small" x="395" y="418" text-anchor="middle">Eligibility check</text>
  <path class="thin" d="M395 330 V252"/>

  <rect class="cyan" x="570" y="120" width="240" height="168" rx="14"/>
  <text class="label" x="690" y="160" text-anchor="middle">Hosted payment step</text>
  <rect class="stage" x="604" y="188" width="172" height="72" rx="10"/>
  <text class="label" x="690" y="218" text-anchor="middle">Payment iframe</text>
  <text class="small" x="690" y="242" text-anchor="middle">Card data stays here</text>
  <path class="line" d="M490 200 H570"/>

  <rect class="gold" x="890" y="148" width="190" height="104" rx="12"/>
  <text class="label" x="985" y="188" text-anchor="middle">Event workflow</text>
  <text class="small" x="985" y="214" text-anchor="middle">Payment ID</text>
  <text class="small" x="985" y="236" text-anchor="middle">Member context</text>
  <path class="line" d="M810 200 H890"/>

  <rect class="stage" x="1120" y="148" width="120" height="104" rx="12"/>
  <text class="label" x="1180" y="188" text-anchor="middle">TPA</text>
  <text class="small" x="1180" y="214" text-anchor="middle">Billing</text>
  <text class="small" x="1180" y="236" text-anchor="middle">system</text>
  <path class="line" d="M1080 200 H1120"/>

  <rect class="panel" x="54" y="330" width="170" height="104" rx="12"/>
  <text class="label" x="139" y="370" text-anchor="middle">Call center</text>
  <text class="small" x="139" y="396" text-anchor="middle">Removed from</text>
  <text class="small" x="139" y="418" text-anchor="middle">routine updates</text>

  <rect class="stage" x="890" y="330" width="190" height="104" rx="12"/>
  <text class="label" x="985" y="370" text-anchor="middle">Support view</text>
  <text class="small" x="985" y="396" text-anchor="middle">Confirm update</text>
  <text class="small" x="985" y="418" text-anchor="middle">in TPA portal</text>
  <path class="thin" d="M224 382 C250 328 274 250 300 200"/>
  <path class="thin" d="M1120 382 H1080"/>

  <rect class="warn" x="570" y="356" width="240" height="78" rx="12"/>
  <text class="label" x="690" y="388" text-anchor="middle">Compliance detail</text>
  <text class="small" x="690" y="414" text-anchor="middle">Card entry stays in Moneris</text>

  <rect class="panel" x="54" y="486" width="220" height="72" rx="10"/>
  <text class="label" x="164" y="520" text-anchor="middle">Delivery window</text>
  <text class="small" x="164" y="544" text-anchor="middle">3 weeks to production</text>
</svg>
