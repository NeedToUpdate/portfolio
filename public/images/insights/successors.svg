<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" role="img" aria-label="The number line built from successors: zero, then S of zero, then S of S of zero, and so on.">
  <style>
    .node { fill: #101417; stroke: #2a3238; stroke-width: 1.5; }
    .num { fill: #e9edf0; font: 600 20px monospace; text-anchor: middle; }
    .arrow { stroke: #3dd6e0; stroke-width: 1.5; fill: none; marker-end: url(#head); }
    .slabel { fill: #3dd6e0; font: 12px monospace; text-anchor: middle; }
    .peano { fill: #98a3ab; font: 11px monospace; text-anchor: middle; }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#3dd6e0" stroke-width="1.2"/>
    </marker>
  </defs>
  <g>
    <circle class="node" cx="60" cy="50" r="24"/>
    <text class="num" x="60" y="57">0</text>
    <text class="peano" x="60" y="102">0</text>

    <path class="arrow" d="M90 50 H164"/>
    <text class="slabel" x="127" y="40">S</text>

    <circle class="node" cx="200" cy="50" r="24"/>
    <text class="num" x="200" y="57">1</text>
    <text class="peano" x="200" y="102">S(0)</text>

    <path class="arrow" d="M230 50 H304"/>
    <text class="slabel" x="267" y="40">S</text>

    <circle class="node" cx="340" cy="50" r="24"/>
    <text class="num" x="340" y="57">2</text>
    <text class="peano" x="340" y="102">S(S(0))</text>

    <path class="arrow" d="M370 50 H444"/>
    <text class="slabel" x="407" y="40">S</text>

    <circle class="node" cx="480" cy="50" r="24"/>
    <text class="num" x="480" y="57">3</text>
    <text class="peano" x="480" y="102">S(S(S(0)))</text>
  </g>
</svg>
