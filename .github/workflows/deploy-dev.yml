name: Deploy Dev

on:
  push:
    branches:
      - dev

concurrency:
  group: deploy-dev
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.DEV_POSTHOG_PROJECT_TOKEN }}
          NEXT_PUBLIC_POSTHOG_HOST: https://dev.artnikitin.dev/relay

      - name: Package standalone build
        run: python scripts/zip_standalone.py

      - name: Deploy
        run: npx serverless deploy --stage dev
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DEV_CERTIFICATE_ARN: ${{ secrets.DEV_CERTIFICATE_ARN }}
          DEV_BASIC_AUTH_USERNAME: ${{ secrets.DEV_BASIC_AUTH_USERNAME }}
          DEV_BASIC_AUTH_PASSWORD: ${{ secrets.DEV_BASIC_AUTH_PASSWORD }}

      - name: Invalidate CloudFront
        run: node scripts/invalidate-cloudfront.mjs dev
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          GITHUB_TOKEN: ${{ github.token }}
